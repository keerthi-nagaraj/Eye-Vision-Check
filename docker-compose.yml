services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: colorvision_backend
    ports:
      - "5001:5000"
    environment:
      - PORT=5000
      - DATABASE_PATH=/app/data/eyevision.db
      - FRONTEND_URL=http://localhost:5173
    volumes:
      - ./backend/data:/app/data
    restart: always

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: colorvision_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_PROXY_TARGET=http://backend:5000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - ./.cursor:/app/.cursor-host
    depends_on:
      - backend
    restart: always

volumes:
  frontend_node_modules:
