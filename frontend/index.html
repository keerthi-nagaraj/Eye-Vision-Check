<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Voice Visual Acuity Demo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#74ebd5,#ACB6E5);
}

#game{
    position:relative;
    width:100vw;
    height:100vh;
    overflow:hidden;
}

.item{
    position:absolute;
    top:-120px;
    user-select:none;
    animation:fall linear forwards;
    font-weight:bold;
}

@keyframes fall{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(120vh);
    }
}

#hud{
    position:absolute;
    top:15px;
    left:15px;
    z-index:9999;
    background:white;
    padding:15px;
    border-radius:12px;
    min-width:280px;
}

#hud div{
    margin-bottom:8px;
}

button{
    padding:10px 18px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="game">

<div id="hud">
    <div id="score">Score: 0</div>
    <div id="timer">60</div>
    <div id="accuracy">Accuracy: 0%</div>
    <div id="smallest">Smallest Correct Size: -</div>

    <button onclick="startGame()">
        Start Test
    </button>

    <div id="speech">
        Waiting for speech...
    </div>
</div>

</div>

<script>

const game = document.getElementById("game");

const scoreBox = document.getElementById("score");
const timerBox = document.getElementById("timer");
const accuracyBox = document.getElementById("accuracy");
const smallestBox = document.getElementById("smallest");
const speechBox = document.getElementById("speech");

let score = 0;
let attempts = 0;
let smallestCorrect = null;

let running = false;
let currentAnswer = "";
let currentSize = 120;

const items = [

{label:"A",display:"A"},
{label:"B",display:"B"},
{label:"C",display:"C"},
{label:"D",display:"D"},
{label:"E",display:"E"},

{label:"1",display:"1"},
{label:"2",display:"2"},
{label:"3",display:"3"},
{label:"4",display:"4"},
{label:"5",display:"5"},

{label:"CAT",display:"CAT"},
{label:"DOG",display:"DOG"},
{label:"BOOK",display:"BOOK"},
{label:"BALL",display:"BALL"},
{label:"TREE",display:"TREE"},
{label:"APPLE",display:"APPLE"},
{label:"HOUSE",display:"HOUSE"},
{label:"PHONE",display:"PHONE"},

{label:"dog",display:"🐶"},
{label:"cat",display:"🐱"},
{label:"lion",display:"🦁"},
{label:"tiger",display:"🐯"},
{label:"elephant",display:"🐘"},

{label:"parrot",display:"🦜"},
{label:"owl",display:"🦉"},
{label:"eagle",display:"🦅"},

{label:"apple",display:"🍎"},
{label:"banana",display:"🍌"},
{label:"grapes",display:"🍇"},
{label:"orange",display:"🍊"},

{label:"car",display:"🚗"},
{label:"book",display:"📚"},
{label:"phone",display:"📱"},
{label:"ball",display:"⚽"},

{label:"star",display:"⭐"},
{label:"circle",display:"⭕"},
{label:"triangle",display:"🔺"},
{label:"square",display:"🟥"}

];

function randomItem(){
    return items[
        Math.floor(
            Math.random()*items.length
        )
    ];
}

function getDifficultySize(timeLeft){

    if(timeLeft > 45) return 55;
    if(timeLeft > 35) return 50;
    if(timeLeft > 25) return 45;
    if(timeLeft > 15) return 40;
    if(timeLeft > 10) return 35;
    if(timeLeft > 5) return 30;

    return 20;
}

function updateStats(){

    scoreBox.innerHTML =
    "Score: " + score;

    const acc =
    attempts === 0
    ? 0
    : ((score/attempts)*100).toFixed(1);

    accuracyBox.innerHTML =
    "Accuracy: " + acc + "%";

    smallestBox.innerHTML =
    "Smallest Correct Size: "
    + (smallestCorrect ?? "-")
    + " px";
}

function spawnItem(size){

    if(!running) return;

    const obj = randomItem();

    currentAnswer =
    obj.label.toLowerCase();

    currentSize = size;

    attempts++;

    updateStats();

    const el =
    document.createElement("div");

    el.className = "item";

    el.innerHTML =
    obj.display;

    el.style.fontSize =
    size + "px";

    el.style.left =
    Math.random() *
    (window.innerWidth-200)
    + "px";

    el.style.animationDuration =
    (Math.random()*3 + 4)
    + "s";

    game.appendChild(el);

    setTimeout(()=>{
        el.remove();
    },7000);
}

function startGame(){

    if(running) return;

    running = true;

    score = 0;
    attempts = 0;
    smallestCorrect = null;

    updateStats();

    let timeLeft = 60;

    timerBox.innerHTML =
    timeLeft;

    const timer =
    setInterval(()=>{

        timeLeft--;

        timerBox.innerHTML =
        timeLeft;

        if(timeLeft <= 0){

            running = false;

            clearInterval(timer);

            alert(
`Test Finished

Score: ${score}

Accuracy:
${((score/attempts)*100).toFixed(1)}%

Smallest Size:
${smallestCorrect ?? '-'} px`
            );
        }

    },1000);

    const spawner =
    setInterval(()=>{

        if(!running){

            clearInterval(spawner);
            return;
        }

        const size =
        getDifficultySize(timeLeft);

        spawnItem(size);

    },1500);
}

const SpeechRecognition =
window.SpeechRecognition ||
window.webkitSpeechRecognition;

if(SpeechRecognition){

    const recognition =
    new SpeechRecognition();

    recognition.continuous = true;
    recognition.interimResults = false;

    recognition.onresult =
    (event)=>{

        const text =
        event.results[
        event.results.length-1
        ][0]
        .transcript
        .toLowerCase();

        speechBox.innerHTML =
        "You Said: " + text;

        if(
            running &&
            text.includes(
                currentAnswer
            )
        ){

            score++;

            if(
                smallestCorrect === null ||
                currentSize < smallestCorrect
            ){
                smallestCorrect =
                currentSize;
            }

            updateStats();
        }
    };

    recognition.start();
}
else{
    speechBox.innerHTML =
    "Speech recognition not supported.";
}

</script>

</body>
</html>
